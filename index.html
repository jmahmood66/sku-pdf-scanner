<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKU PDF Scanner (Instant Index)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    text-align: center;
}

h2 { margin: 10px 0; }

#controls { margin: 10px; }

#skuInput {
    padding: 10px;
    font-size: 18px;
    width: 300px;
}

#status {
    font-weight: bold;
    margin: 5px 0;
}

#viewer {
    height: calc(100vh - 140px);
    display: flex;
    align-items: center;
    justify-content: center;
}

#pdfCanvas {
    border: 1px solid #333;
    max-width: 95vw;
    max-height: 100%;
    background: white;
}

/* 🔴 NOT FOUND OVERLAY */
#notFoundOverlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;

    background: rgba(0,0,0,0.85);
    color: white;

    display: none;
    align-items: center;
    justify-content: center;

    font-size: 60px;
    font-weight: bold;
    letter-spacing: 2px;

    z-index: 9999;
}
</style>
</head>

<body>

<h2>Instant SKU Scanner</h2>

<div id="controls">
    <input type="text" id="skuInput" placeholder="Scan SKU here" autofocus>
    <button onclick="searchSKU()">Search</button>
</div>

<div id="status">Building index...</div>

<div id="viewer">
    <canvas id="pdfCanvas"></canvas>
</div>

<!-- 🔴 NOT FOUND SCREEN -->
<div id="notFoundOverlay">SKU NOT FOUND</div>

<script>
const url = 'Logo-Reference-Book.pdf';

let pdfDoc = null;
let skuIndex = {};

/* ---------------- NORMALIZER ---------------- */
function normalize(text) {
    return text.replace(/[\s\-]+/g, '');
}

/* ---------------- OVERLAY CONTROLS ---------------- */
function showNotFound() {
    document.getElementById('notFoundOverlay').style.display = 'flex';
}

function hideNotFound() {
    document.getElementById('notFoundOverlay').style.display = 'none';
}

/* ---------------- LOAD + BUILD INDEX ---------------- */
pdfjsLib.getDocument(url).promise.then(async pdf => {
    pdfDoc = pdf;

    document.getElementById('status').innerText = "Indexing PDF...";

    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();

        let text = content.items.map(item => item.str).join('');
        skuIndex[i] = normalize(text);
    }

    document.getElementById('status').innerText = "Ready to scan.";
    renderPage(1);
});

/* ---------------- RENDER PAGE ---------------- */
async function renderPage(num, highlight = null) {
    const page = await pdfDoc.getPage(num);

    const canvas = document.getElementById('pdfCanvas');
    const ctx = canvas.getContext('2d');

    const viewport = page.getViewport({ scale: 1 });

    const scale = Math.min(
        window.innerWidth * 0.95 / viewport.width,
        window.innerHeight * 0.75 / viewport.height
    );

    const scaledViewport = page.getViewport({ scale });

    canvas.width = scaledViewport.width;
    canvas.height = scaledViewport.height;

    canvas.style.width = scaledViewport.width + "px";
    canvas.style.height = scaledViewport.height + "px";

    await page.render({
        canvasContext: ctx,
        viewport: scaledViewport
    }).promise;

    /* ---------------- HIGHLIGHT ---------------- */
    if (highlight) {

        const textContent = await page.getTextContent();
        const normSearch = normalize(highlight);

        let fullText = '';
        let map = [];

        textContent.items.forEach(item => {
            const cleaned = normalize(item.str);

            for (let i = 0; i < cleaned.length; i++) {
                map.push({ item });
                fullText += cleaned[i];
            }
        });

        let index = fullText.indexOf(normSearch);

        while (index !== -1) {

            for (let i = index; i < index + normSearch.length; i++) {
                const item = map[i].item;

                const tx = pdfjsLib.Util.transform(
                    scaledViewport.transform,
                    item.transform
                );

                const x = tx[4];
                const y = tx[5];

                ctx.fillStyle = "rgba(255, 255, 0, 0.35)";
                ctx.fillRect(
                    x,
                    y - item.height * scale,
                    item.width * scale,
                    item.height * scale
                );
            }

            index = fullText.indexOf(normSearch, index + 1);
        }
    }

    document.getElementById('status').innerText = "Viewing page " + num;
}

/* ---------------- SEARCH ---------------- */
function searchSKU() {
    const input = document.getElementById('skuInput');
    const sku = normalize(input.value);

    if (!sku) return;

    document.getElementById('status').innerText = "Searching...";
    hideNotFound();

    for (const page in skuIndex) {
        if (skuIndex[page].includes(sku)) {

            renderPage(parseInt(page), input.value);

            document.getElementById('status').innerText =
                "Found on page " + page;

            hideNotFound();

            input.value = '';
            input.focus();
            return;
        }
    }

    document.getElementById('status').innerText = "SKU not found.";
    showNotFound();

    input.value = '';
    input.focus();
}

/* ---------------- ENTER KEY ---------------- */
document.getElementById('skuInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        searchSKU();
    }
});

/* ---------------- AUTO FOCUS ---------------- */
setInterval(() => {
    const input = document.getElementById('skuInput');
    if (document.activeElement !== input) {
        input.focus();
    }
}, 1000);
</script>

</body>
</html>
