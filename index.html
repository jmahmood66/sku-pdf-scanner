<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKU PDF Scanner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    text-align: center;
}

h2 {
    margin: 10px 0;
}

#controls {
    margin: 10px;
}

#skuInput {
    padding: 10px;
    font-size: 18px;
    width: 300px;
}

#status {
    font-weight: bold;
    margin: 5px 0;
}

#viewer {
    height: calc(100vh - 140px);
    display: flex;
    align-items: center;
    justify-content: center;
}

#pdfCanvas {
    border: 1px solid #333;
    max-width: 95vw;
    max-height: 100%;
    background: white;
}
</style>
</head>

<body>

<h2>Scan SKU to Find Page</h2>

<div id="controls">
    <input type="text" id="skuInput" placeholder="Scan SKU here" autofocus>
    <button onclick="searchPDF()">Search</button>
</div>

<div id="status">Loading PDF...</div>

<div id="viewer">
    <canvas id="pdfCanvas"></canvas>
</div>

<script>
const url = 'Logo-Reference-Book.pdf';

let pdfDoc = null;
let currentPage = 1;
let currentHighlights = [];

/* ---------------- LOAD PDF ---------------- */
pdfjsLib.getDocument(url).promise.then(pdf => {
    pdfDoc = pdf;
    document.getElementById('status').innerText = "PDF Loaded. Ready to scan.";
    renderPage(1);
});

/* ---------------- RENDER PAGE ---------------- */
async function renderPage(num, searchTerm = null) {
    const page = await pdfDoc.getPage(num);

    const canvas = document.getElementById('pdfCanvas');
    const ctx = canvas.getContext('2d');

    const viewport = page.getViewport({ scale: 1 });

    const containerWidth = window.innerWidth * 0.95;
    const containerHeight = window.innerHeight * 0.75;

    const scaleW = containerWidth / viewport.width;
    const scaleH = containerHeight / viewport.height;

    const scale = Math.min(scaleW, scaleH);

    const scaledViewport = page.getViewport({ scale });

    canvas.width = scaledViewport.width;
    canvas.height = scaledViewport.height;

    canvas.style.width = scaledViewport.width + "px";
    canvas.style.height = scaledViewport.height + "px";

    await page.render({
        canvasContext: ctx,
        viewport: scaledViewport
    }).promise;

    // CLEAR OLD HIGHLIGHTS
    currentHighlights = [];

    if (searchTerm) {
        const textContent = await page.getTextContent();

        const normSearch = searchTerm.replace(/\s+/g, '');

        textContent.items.forEach(item => {
            const text = item.str.replace(/\s+/g, '');

            if (text.includes(normSearch)) {
                const transform = pdfjsLib.Util.transform(
                    scaledViewport.transform,
                    item.transform
                );

                const x = transform[4];
                const y = transform[5];

                const width = item.width * scale;
                const height = item.height * scale;

                ctx.fillStyle = "rgba(255, 255, 0, 0.4)";
                ctx.fillRect(x, y - height, width, height);

                currentHighlights.push({ x, y, width, height });
            }
        });
    }

    document.getElementById('status').innerText = "Viewing page " + num;
    currentPage = num;
}

/* ---------------- SEARCH ---------------- */
async function searchPDF() {
    const input = document.getElementById('skuInput');
    const sku = input.value.trim().replace(/\s+/g, '');

    document.getElementById('status').innerText = "Searching...";

    for (let i = 1; i <= pdfDoc.numPages; i++) {
        const page = await pdfDoc.getPage(i);
        const content = await page.getTextContent();

        let text = content.items.map(item => item.str).join(' ');
        text = text.replace(/\s+/g, '');

        if (text.includes(sku)) {
            await renderPage(i, sku);
            scrollToHighlight();
            document.getElementById('status').innerText = "Found on page " + i;
            return;
        }
    }

    document.getElementById('status').innerText = "SKU not found.";
}

/* ---------------- SCROLL TO FIRST HIGHLIGHT ---------------- */
function scrollToHighlight() {
    const viewer = document.getElementById('viewer');

    if (currentHighlights.length > 0) {
        const first = currentHighlights[0];
        viewer.scrollTo({
            top: first.y - 100,
            behavior: "smooth"
        });
    }
}

/* ---------------- ENTER TRIGGERS SEARCH ---------------- */
document.getElementById('skuInput').addEventListener('input', function () {
    const value = this.value.trim();
    if (value.length >= 3) {
        searchPDF(); // instant typeahead
    }
});

document.getElementById('skuInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        searchPDF();
    }
});
</script>

</body>
</html>
